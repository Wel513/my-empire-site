<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME GENEVE | Imperial Timepieces</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --light: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        header h1 {
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            margin: 0;
            font-size: 2.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .catalog-page, .details-page {
            transition: opacity 0.3s ease;
        }

        .hidden { display: none; }

        .watch-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .watch-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .watch-image {
            width: 100%;
            height: 250px;
            background: #1a1a1a; /* Заглушка под фото */
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .watch-card h3 {
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        /* Страница деталей */
        .details-container {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            align-items: center;
            margin-top: 30px;
        }

        .details-info { flex: 1; min-width: 300px; }
        .details-info h2 { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }
        .price { font-size: 1.5rem; color: #fff; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table td { padding: 10px; border-bottom: 1px solid #222; }
        table td:first-child { color: var(--gold); font-weight: bold; width: 40%; }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #888;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>CHROME GENEVE</h1>
    <p style="color: #666; font-style: italic;">Имперское качество. Вне времени.</p>
</header>

<div class="container" id="catalog-page">
    <div class="watch-card">
        <div class="watch-image">Classic Heritage</div>
        <h3>HERITAGE GOLD</h3>
        <button class="btn" onclick="openDetails('Heritage Gold', 'Воплощение классики в корпусе из 18-каратного золота. Эти часы подчеркивают статус и непоколебимую уверенность владельца.', '450,000₽', {'Механизм': 'Автоподзавод', 'Запас хода': '72 часа', 'Стекло': 'Сапфировое'})">Подробнее</button>
    </div>
    <div class="watch-card">
        <div class="watch-image">Obsidian Black</div>
        <h3>OBSIDIAN NIGHT</h3>
        <button class="btn" onclick="openDetails('Obsidian Night', 'Черный матовый титан и глубокий черный циферблат. Выбор тех, кто предпочитает скрытую мощь.', '320,000₽', {'Корпус': 'Титан', 'Ремешок': 'Кожа аллигатора', 'Водозащита': '100м'})">Подробнее</button>
    </div>

    <div class="watch-card">
        <div class="watch-image">Admiral Silver</div>
        <h3>ADMIRAL STEEL</h3>
        <button class="btn" onclick="openDetails('Admiral Steel', 'Стальная мощь и точность хронографа. Идеальный баланс между спортом и деловым стилем.', '280,000₽', {'Диаметр': '42мм', 'Функции': 'Хронограф, Дата', 'Материал': 'Сталь 316L'})">Подробнее</button>
    </div>
</div>

<div class="container hidden" id="details-page">
    <a class="back-link" onclick="closeDetails()">← Назад в каталог</a>
    <div class="details-container">
        <div class="watch-image" id="details-img" style="height: 400px; flex: 1;">IMAGE</div>
        <div class="details-info">
            <h2 id="details-title">Название модели</h2>
            <p class="price" id="details-price">Цена</p>
            <p id="details-desc">Описание товара...</p>
            <table id="details-table"></table>
            <button class="btn" style="background: var(--gold); color: black; margin-top: 20px;">Заказать в империю</button>
        </div>
    </div>
</div>

<script>
    const catalogPage = document.getElementById('catalog-page');
    const detailsPage = document.getElementById('details-page');

    function openDetails(name, desc, price, stats) {
        document.getElementById('details-title').innerText = name;
        document.getElementById('details-desc').innerText = desc;
        document.getElementById('details-price').innerText = price;
        document.getElementById('details-img').innerText = name;

        const table = document.getElementById('details-table');
        table.innerHTML = ""; // Очистка старой таблицы
        
        for (const [key, value] of Object.entries(stats)) {
            const row = <tr><td>${key}</td><td>${value}</td></tr>;
            table.innerHTML += row;
        }

        catalogPage.classList.add('hidden');
        detailsPage.classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function closeDetails() {
        detailsPage.classList.add('hidden');
        catalogPage.classList.remove('hidden');
    }
</script>

</body>
</html>
