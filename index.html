<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME GENEVE | Imperial Timepieces</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --light: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        header h1 {
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--gold);
            margin: 0;
            font-size: 2.8rem;
            font-weight: 300;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .hidden { display: none; }

        .watch-card {
            background: #111;
            border: 1px solid #1a1a1a;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .watch-card:hover {
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .watch-placeholder {
            width: 100%;
            height: 250px;
            background: linear-gradient(45deg, #1a1a1a, #222);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .watch-card h3 {
            margin: 20px 0;
            letter-spacing: 3px;
            font-weight: 400;
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        /* Страница деталей */
        .details-view {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .details-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 60px;
            margin-top: 40px;
        }

        .details-info { flex: 1; min-width: 300px; }
        .details-info h2 { color: var(--gold); font-size: 2.5rem; margin-top: 0; letter-spacing: 2px; }
        .price { font-size: 1.8rem; color: #fff; margin-bottom: 30px; }
        
        table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        table td { padding: 15px 0; border-bottom: 1px solid #222; }
        table td:first-child { color: var(--gold); text-transform: uppercase; font-size: 0.8rem; width: 40%; }

        .back-btn {
            display: inline-block;
            margin-bottom: 40px;
            color: #666;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>CHROME GENEVE</h1>
    <p style="color: #444; letter-spacing: 3px; text-transform: uppercase; font-size: 0.7rem; margin-top: 10px;">Imperial Watchmakers since 2026</p>
</header>
<div class="container" id="catalog-section">
    <div class="catalog-grid">
        <div class="watch-card">
            <div class="watch-placeholder">HERITAGE</div>
            <h3>Heritage Gold</h3>
            <button class="btn" onclick="showProduct('Heritage Gold', 'Классика, не подвластная времени. Корпус из желтого золота, матовый циферблат и совершенство в каждой детали.', '450,000₽', {'Механизм': 'Калибр CH-01', 'Запас хода': '72 часа', 'Стекло': 'Сапфир'})">Подробнее</button>
        </div>

        <div class="watch-card">
            <div class="watch-placeholder">OBSIDIAN</div>
            <h3>Obsidian Night</h3>
            <button class="btn" onclick="showProduct('Obsidian Night', 'Черный титан и угольный циферблат. Часы для тех, кто правит ночью.', '320,000₽', {'Корпус': 'Титан DLC', 'Ремешок': 'Аллигатор', 'Водозащита': '100м'})">Подробнее</button>
        </div>
    </div>
</div>

<div class="container hidden" id="details-section">
    <a class="back-btn" onclick="hideProduct()">← Вернуться в каталог</a>
    <div class="details-view">
        <div class="details-flex">
            <div class="watch-placeholder" id="p-img" style="height: 450px; flex: 1;">IMAGE</div>
            <div class="details-info">
                <h2 id="p-title">Название</h2>
                <div class="price" id="p-price">0₽</div>
                <p id="p-desc" style="color: #888; font-size: 1.1rem;"></p>
                <table id="p-table"></table>
                <button class="btn" style="background: var(--gold); color: #000; width: 100%; margin-top: 20px; font-weight: bold;">Связаться с мануфактурой</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showProduct(name, desc, price, specs) {
        document.getElementById('p-title').innerText = name;
        document.getElementById('p-desc').innerText = desc;
        document.getElementById('p-price').innerText = price;
        document.getElementById('p-img').innerText = name;

        const table = document.getElementById('p-table');
        table.innerHTML = "";
        for (const [key, value] of Object.entries(specs)) {
            table.innerHTML += <tr><td>${key}</td><td>${value}</td></tr>;
        }

        document.getElementById('catalog-section').classList.add('hidden');
        document.getElementById('details-section').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function hideProduct() {
        document.getElementById('details-section').classList.add('hidden');
        document.getElementById('catalog-section').classList.remove('hidden');
    }
</script>

</body>
</html>
