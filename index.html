<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME GENEVE | Imperial Timepieces</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --light: #f4f4f4; }
        body { margin: 0; font-family: 'Helvetica', sans-serif; background-color: var(--dark); color: var(--light); }
        header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #222; }
        header h1 { letter-spacing: 10px; text-transform: uppercase; color: var(--gold); margin: 0; font-size: 2.5rem; }
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .hidden { display: none !important; }
        .watch-card { background: #111; border: 1px solid #1a1a1a; padding: 30px; text-align: center; transition: 0.4s; }
        .watch-card:hover { border-color: var(--gold); }
        .placeholder { width: 100%; height: 200px; background: #1a1a1a; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: #333; letter-spacing: 2px; }
        .btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        .btn:hover { background: var(--gold); color: #000; }
        
        /* Стили страницы деталей */
        .details-view { display: flex; flex-wrap: wrap; gap: 50px; }
        .info-col { flex: 1; min-width: 300px; }
        .price { font-size: 1.8rem; color: #fff; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table td { padding: 12px 0; border-bottom: 1px solid #222; }
        table td:first-child { color: var(--gold); width: 40%; font-size: 0.8rem; text-transform: uppercase; }
        .back-btn { cursor: pointer; color: #666; margin-bottom: 30px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>CHROME GENEVE</h1>
    <p style="color: #444; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 3px; margin-top: 10px;">Imperial Watchmakers Since 2026</p>
</header>

<div class="container" id="catalog">
    <div class="catalog-grid">
        <div class="watch-card">
            <div class="placeholder">HERITAGE</div>
            <h3>HERITAGE GOLD</h3>
            <button class="btn" onclick="showWatch('HERITAGE GOLD', '450,000₽', 'Классика империи. Корпус из 18-каратного золота.', {'Механизм': 'CH-01', 'Запас': '72ч'})">Подробнее</button>
        </div>
        <div class="watch-card">
            <div class="placeholder">OBSIDIAN</div>
            <h3>OBSIDIAN NIGHT</h3>
            <button class="btn" onclick="showWatch('OBSIDIAN NIGHT', '320,000₽', 'Титановая мощь. Матовый черный финиш.', {'Корпус': 'Титан DLC', 'Вода': '100м'})">Подробнее</button>
        </div>
        <div class="watch-card">
            <div class="placeholder">STEEL</div>
            <h3>ADMIRAL STEEL</h3>
            <button class="btn" onclick="showWatch('ADMIRAL STEEL', '210,000₽', 'Стальная решительность для повседневных задач.', {'Сталь': '316L', 'Диаметр': '42мм'})">Подробнее</button>
        </div>
    </div>
</div>

<div class="container hidden" id="details">
    <div class="back-btn" onclick="hideWatch()">← НАЗАД В КАТАЛОГ</div>
    <div class="details-view">
        <div class="placeholder" style="height: 400px; flex: 1;">IMAGE</div>
        <div class="info-col">
            <h2 id="d-title" style="color: var(--gold); letter-spacing: 3px;"></h2>
            <div class="price" id="d-price"></div>
            <p id="d-desc" style="color: #888;"></p>
            <table id="d-table"></table>
            <button class="btn" style="background: var(--gold); color: #000; width: 100%; font-weight: bold;">ЗАКАЗАТЬ</button>
        </div>
    </div>
</div>
<script>
    function showWatch(name, price, desc, specs) {
        document.getElementById('d-title').innerText = name;
        document.getElementById('d-price').innerText = price;
        document.getElementById('d-desc').innerText = desc;
        
        const table = document.getElementById('d-table');
        table.innerHTML = "";
        for (let key in specs) {
            table.innerHTML += <tr><td>${key}</td><td>${specs[key]}</td></tr>;
        }
        
        document.getElementById('catalog').classList.add('hidden');
        document.getElementById('details').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function hideWatch() {
        document.getElementById('details').classList.add('hidden');
        document.getElementById('catalog').classList.remove('hidden');
    }
</script>

</body>
</html>
