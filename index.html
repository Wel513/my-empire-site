<!DOCTYPE html>
<html lang="ru" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME GENEVE</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --white: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--dark); color: var(--white); }
        header { padding: 50px 20px; text-align: center; border-bottom: 1px solid #222; }
        h1 { letter-spacing: 10px; color: var(--gold); text-transform: uppercase; margin: 0; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #111; border: 1px solid #222; padding: 30px; text-align: center; }
        .img-box { width: 100%; height: 200px; background: #1a1a1a; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: #333; }
        .btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn:hover { background: var(--gold); color: #000; }
        .hidden { display: none !important; }
        .details-content { display: flex; flex-wrap: wrap; gap: 40px; }
        .back { cursor: pointer; color: #666; display: block; margin-bottom: 20px; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>CHROME GENEVE</h1>
</header>

<div class="container" id="main-page">
    <div class="grid">
        <div class="card">
            <div class="img-box">HERITAGE</div>
            <h3>HERITAGE GOLD</h3>
            <button class="btn" onclick="openMe('HERITAGE GOLD', '450.000₽', 'Корпус из чистого золота 18К. Символ вашей власти.')">ПОДРОБНЕЕ</button>
        </div>
        <div class="card">
            <div class="img-box">OBSIDIAN</div>
            <h3>OBSIDIAN NIGHT</h3>
            <button class="btn" onclick="openMe('OBSIDIAN NIGHT', '320.000₽', 'Черный титан. Для тех, кто контролирует тени.')">ПОДРОБНЕЕ</button>
        </div>
    </div>
</div>

<div class="container hidden" id="page-details">
    <div class="back" onclick="closeMe()">← НАЗАД</div>
    <div class="details-content">
        <div class="img-box" style="flex:1; height: 350px;">PHOTO</div>
        <div style="flex:1;">
            <h2 id="view-title" style="color:var(--gold); font-size: 32px;"></h2>
            <p id="view-price" style="font-size: 24px; font-weight: bold;"></p>
            <p id="view-desc" style="color:#aaa; line-height: 1.8;"></p>
            <button class="btn" style="width:100%; margin-top: 20px; background: var(--gold); color: black;">СВЯЗАТЬСЯ С НАМИ</button>
        </div>
    </div>
</div>

<script>
    /* Эта функция ПРЯЧЕТ каталог и ПОКАЗЫВАЕТ описание */
    function openMe(name, price, desc) {
        document.getElementById('view-title').innerHTML = name;
        document.getElementById('view-price').innerHTML = price;
        document.getElementById('view-desc').innerHTML = desc;

        document.getElementById('main-page').classList.add('hidden');
        document.getElementById('page-details').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    /* Эта функция ПРЯЧЕТ описание и ПОКАЗЫВАЕТ каталог */
    function closeMe() {
        document.getElementById('page-details').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
    }
</script>

</body>
</html>
